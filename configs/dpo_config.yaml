# ── DPO Training Configuration ────────────────────────────────
# Used in: notebooks/03_dpo_training.ipynb
#
# Direct Preference Optimization (DPO) hyperparameters.
# All values are grounded in the original DPO paper
# (Rafailov et al. 2023) and practical T4 GPU constraints.

training:
  output_dir: "/kaggle/working/dpo_model"
  num_train_epochs: 1
  per_device_train_batch_size: 2    # DPO uses 2x memory vs SFT because
                                    # it processes chosen + rejected per step
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8   # effective batch = 2 * 8 = 16
  learning_rate: 5.0e-5             # lower than SFT — DPO needs finer updates
  warmup_ratio: 0.1                 # longer warmup for DPO stability
  lr_scheduler_type: "cosine"
  bf16: true
  logging_steps: 25
  save_steps: 100
  eval_steps: 100
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  report_to: "none"

dpo:
  # beta: KL divergence penalty — controls how far the policy
  # can drift from the reference model (SFT baseline).
  #
  # Low beta (0.05): aggressive alignment, higher win rate but
  #   risks the model forgetting SFT instruction-following knowledge.
  # High beta (0.5): conservative, stays close to reference,
  #   weaker preference alignment signal.
  # 0.1 is the value used in the original DPO paper.
  beta: 0.1

  # loss_type: "sigmoid" is the standard DPO loss from the paper.
  # Alternatives: "hinge" (more aggressive), "ipo" (implicit preference optimization)
  loss_type: "sigmoid"

  max_length: 1024       # total sequence length (prompt + response)
  max_prompt_length: 512 # prompt gets half the budget

data:
  train_path: "/kaggle/input/ultrafeedback-10k/ultrafeedback_10k.jsonl"
  sft_adapter_path: "/kaggle/input/sft-adapter/sft_adapter"
  dpo_adapter_output: "/kaggle/working/dpo_adapter"
  train_split: 0.9
  val_split: 0.1
  seed: 42

# ── Beta ablation plan ─────────────────────────────────────────
# Retrain with each value and record win rate in notebook 04
# ablation_betas: [0.05, 0.1, 0.3, 0.5]
#
# Expected behavior:
#   beta=0.05 -> highest win rate, risk of reward hacking
#   beta=0.1  -> balanced (paper default)
#   beta=0.3  -> conservative, moderate improvement
#   beta=0.5  -> minimal drift from SFT, lowest win rate
